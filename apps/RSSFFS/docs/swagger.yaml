basePath: /
definitions:
  web.CategoryResponse:
    properties:
      categories:
        items:
          $ref: '#/definitions/web.CategoryResponseItem'
        type: array
      error:
        type: string
      success:
        type: boolean
    type: object
  web.CategoryResponseItem:
    properties:
      id:
        type: integer
      title:
        type: string
    type: object
  web.LogEntry:
    properties:
      fields:
        additionalProperties: true
        type: object
      level:
        type: string
      message:
        type: string
      timestamp:
        type: string
    type: object
  web.LogsResponse:
    properties:
      error:
        type: string
      logs:
        items:
          $ref: '#/definitions/web.LogEntry'
        type: array
      success:
        type: boolean
    type: object
  web.SubmitResponse:
    properties:
      count:
        type: integer
      error:
        type: string
      message:
        type: string
      success:
        type: boolean
      validation_errors:
        items:
          $ref: '#/definitions/web.ValidationError'
        type: array
    type: object
  web.ValidationError:
    properties:
      field:
        type: string
      message:
        type: string
    type: object
info:
  contact: {}
  description: HTTP API for discovering RSS feeds, subscribing through the configured
    RSS reader, listing categories, and viewing application logs. When web credentials
    are configured, operations require HTTP Basic authentication. Submissions also
    require an X-CSRF-Token header matching the csrf_token cookie issued by the web
    interface.
  license:
    name: MIT
    url: https://github.com/toozej/monogo/blob/main/apps/RSSFFS/LICENSE
  title: RSSFFS API
  version: "1.0"
paths:
  /categories:
    get:
      description: Returns categories from the configured RSS reader. If it cannot
        be reached, the response contains a fallback category list with ID 0. Basic
        authentication is required when web credentials are configured.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.CategoryResponse'
        "401":
          description: Unauthorized
          schema:
            type: string
      security:
      - BasicAuth: []
      summary: List RSS reader categories
      tags:
      - categories
  /logs:
    get:
      description: Returns captured log entries in chronological order. Values above
        200 are capped. Basic authentication is required when web credentials are
        configured.
      parameters:
      - default: 50
        description: Maximum number of recent entries
        in: query
        maximum: 200
        minimum: 1
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.LogsResponse'
        "401":
          description: Unauthorized
          schema:
            type: string
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/web.LogsResponse'
      security:
      - BasicAuth: []
      summary: List recent application logs
      tags:
      - logs
  /logs/stream:
    get:
      description: Opens a Server-Sent Events stream with recent log entries, periodic
        heartbeats, and subsequent updates. Basic authentication is required when
        web credentials are configured.
      produces:
      - text/event-stream
      responses:
        "200":
          description: Server-Sent Events stream
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
      security:
      - BasicAuth: []
      summary: Stream application logs
      tags:
      - logs
  /submit:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Finds RSS feeds from the submitted URL and subscribes to them through
        the configured RSS reader. X-CSRF-Token must match the csrf_token cookie issued
        by GET /. Basic authentication is required when web credentials are configured.
      parameters:
      - description: Page URL to inspect
        format: uri
        in: formData
        name: url
        required: true
        type: string
      - description: RSS reader category for subscribed feeds
        in: formData
        maxLength: 100
        name: category
        type: string
      - default: false
        description: Only search the submitted URL's domain
        in: formData
        name: single_url_mode
        type: boolean
      - description: CSRF token matching the csrf_token cookie
        in: header
        name: X-CSRF-Token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.SubmitResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/web.SubmitResponse'
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/web.SubmitResponse'
        "429":
          description: Rate limit exceeded
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/web.SubmitResponse'
      security:
      - BasicAuth: []
      summary: Discover and subscribe to RSS feeds
      tags:
      - feeds
schemes:
- http
- https
securityDefinitions:
  BasicAuth:
    type: basic
swagger: "2.0"
