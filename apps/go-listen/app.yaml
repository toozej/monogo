---
name: go-listen
binary: go-listen
path: apps/go-listen
mainPath: apps/go-listen
description: "go-listen is a web application that allows users to search for artists and automatically\
  \ add their top 5 songs to designated \"incoming\" playlists on Spotify"
shortDescription: "go-listen"
goImage: golang:1.26-trixie
distrolessImage: gcr.io/distroless/static-debian13:nonroot
distrolessOnly: true
# cgoEnabled defaults to false. When true, builds use CGO_ENABLED=1, the runtime
# image becomes glibc-capable (debian:trixie-slim / distroless base-debian), and
# GoReleaser is trimmed to the native linux/amd64 platform.
cgoEnabled: false
# runtimeImage (optional) overrides the runtime base for the non-distroless
# Dockerfile. Defaults to "scratch", or "debian:trixie-slim" when cgoEnabled is true.
# runtimeImage: debian:trixie-slim
# port (optional) is EXPOSEd in the generated Dockerfiles when set.
port: 8080
swaggerEnabled: true
swaggerGeneralInfo: internal/server/server.go
writableDirs:
  - /config
compose:
  environment:
    SERVER_HOST: 0.0.0.0
    SPOTIFY_CLIENT_ID: "${SPOTIFY_CLIENT_ID:?set SPOTIFY_CLIENT_ID}"
    SPOTIFY_CLIENT_SECRET: "${SPOTIFY_CLIENT_SECRET:?set SPOTIFY_CLIENT_SECRET}"
    SPOTIFY_REDIRECT_URL: "${SPOTIFY_REDIRECT_URL:-http://localhost:8080/callback}"
    SPOTIFY_TOKEN_FILE: /config/spotify-token.json
    SECURITY_USERNAME: "${SECURITY_USERNAME:-go-listen}"
    SECURITY_PASSWORD: "${SECURITY_PASSWORD:?set SECURITY_PASSWORD}"
  ports:
    - 8080:8080
  volumes:
    - go-listen-config:/config
  namedVolumes:
    - go-listen-config
