---
name: 'Check All GitHub Actions'
description: 'Run all checks: archived, EOL, and outdated with optional auto-update'
author: 'toozej'
inputs:
  token:
    description: 'GitHub token for API access'
    required: true
  verbose:
    description: 'Enable verbose output'
    required: false
    default: 'false'
  debug:
    description: 'Enable debug logging'
    required: false
    default: 'false'
  workflow:
    description: 'Path to specific workflow file to check (optional, checks all if not specified)'
    required: false
  workflows-dir:
    description: 'Path to directory containing workflow yaml files (optional, checks all if
      not specified)'
    required: false
  repos-dir:
    description: 'Path to base directory containing multiple repos to scan (optional)'
    required: false
  notify:
    description: 'Send notifications to configured endpoints when issues are found'
    required: false
    default: 'false'
  create-issue:
    description: 'Create GitHub issue when archived actions are found'
    required: false
    default: 'false'
  write:
    description: 'Automatically apply updates for EOL and outdated actions (skipped if archived
      actions found)'
    required: false
    default: 'false'
  stale-days:
    description: 'Number of days after which an action is considered stale (default 365)'
    required: false
    default: '365'
outputs:
  archived-count:
    description: 'Number of archived actions found'
  has-archived:
    description: 'Whether any archived actions were found (true/false)'
  outdated-count:
    description: 'Number of outdated actions found'
  has-outdated:
    description: 'Whether any outdated actions were found (true/false)'
  eol-count:
    description: 'Number of EOL/stale/deprecated actions found'
  has-eol:
    description: 'Whether any EOL actions were found (true/false)'
runs:
  using: 'docker'
  image: 'docker://ghcr.io/toozej/go-sort-out-gh-actions:latest'
  args:
    - check
    - --token=${{ inputs.token }}
    - --verbose=${{ inputs.verbose }}
    - --debug=${{ inputs.debug }}
    - --workflow=${{ inputs.workflow }}
    - --workflows-dir=${{ inputs.workflows-dir }}
    - --repos-dir=${{ inputs.repos-dir }}
    - --notify=${{ inputs.notify }}
    - --create-issue=${{ inputs.create-issue }}
    - --write=${{ inputs.write }}
    - --stale-days=${{ inputs.stale-days }}

