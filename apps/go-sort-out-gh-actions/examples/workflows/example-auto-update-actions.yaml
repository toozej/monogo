---
name: Example - Auto-Update Outdated Actions
on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  auto-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check and update outdated GitHub Actions
        id: update
        uses: toozej/monogo/apps/go-sort-out-gh-actions/check-outdated@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          verbose: true
          update: true
          pin: true

      - name: Commit and push updated workflows
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ".github/workflows/**.yml" ".github/workflows/**.yaml"
          git diff --cached --quiet || git commit -m "chore(deps): pin outdated GitHub Actions to SHA references"
          git push
