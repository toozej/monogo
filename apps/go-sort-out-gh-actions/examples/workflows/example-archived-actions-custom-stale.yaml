---
name: Example - Archived Actions with Custom Stale Threshold
on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  check-archived-custom-stale:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check for archived GitHub Actions (180-day stale threshold)
        id: check
        uses: toozej/go-sort-out-gh-actions/check-archived@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          verbose: true
          stale-days: 180
          notify: true
          create-issue: true

      - name: Fail if archived or stale actions found
        if: steps.check.outputs.has-archived == 'true' || steps.check.outputs.has-stale ==
          'true'
        run: |
          echo "Archived or stale GitHub Actions detected. Please replace them."
          exit 1
