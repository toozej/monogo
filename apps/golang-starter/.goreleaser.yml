---
version: 2

project_name: golang-starter
dist: dist/golang-starter

env:
  - GO111MODULE=on

env_files:
  gitlab_token: ~/nope
  gitea_token: ~/nope

before:
  hooks:
    - go mod tidy
    - ./scripts/completions.sh golang-starter
    - ./scripts/manpages.sh golang-starter

snapshot:
  version_template: '{{ incpatch .Version }}-next'

builds:
  - id: golang-starter
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - "386"
      - amd64
      - arm
      - arm64
    goarm:
      - "7"
    ignore:
      - goos: windows
        goarch: arm
    mod_timestamp: '{{ .CommitTimestamp }}'
    flags:
      - -trimpath
    ldflags:
      - >-
        -s -w
        -X github.com/toozej/monogo/pkg/version.Version=v{{ envOrDefault "MONOGO_APP_VERSION" .Version }}
        -X github.com/toozej/monogo/pkg/version.Commit={{.Commit}}
        -X github.com/toozej/monogo/pkg/version.Branch={{.Branch}}
        -X github.com/toozej/monogo/pkg/version.BuiltAt={{.CommitDate}}
        -X github.com/toozej/monogo/pkg/version.Builder=goreleaser
    main: ./apps/golang-starter
    binary: golang-starter

universal_binaries:
  - replace: false

checksum:
  name_template: 'checksums.txt'

docker_digest:
  name_template: 'digests.txt'

changelog:
  # Release notes are produced by `gh` (CI) / the Makefile, not GoReleaser,
  # whenever the SCM release is disabled. Skip GoReleaser's own changelog then
  # to avoid noisy GitHub API calls and empty .PreviousTag lookups against the
  # local-only vX.Y.Z tag. Condition mirrors release.disable below.
  disable: '{{ or (eq (envOrDefault "MONOGO_APP_RELEASE" "false") "true") (eq (envOrDefault "GORELEASER_DOCKER_REFRESH" "false") "true") }}'
  sort: asc
  use: github
  filters:
    exclude:
      - '^test:'
      - '^chore'
      - 'merge conflict'
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch
      - go mod tidy
  groups:
    - title: Dependency updates
      regexp: "^.*feat\\(deps\\)*:+.*$"
      order: 300
    - title: 'New Features'
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 100
    - title: 'Bug fixes'
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 200
    - title: 'Documentation updates'
      regexp: "^.*docs[(\\w)]*:+.*$"
      order: 400
    - title: Other work
      order: 9999

dockers_v2:
  - id: golang-starter
    images:
      - 'toozej/golang-starter'
      - 'ghcr.io/toozej/golang-starter'
      - 'quay.io/toozej/golang-starter'
    tags:
      - '{{ if ne (envOrDefault "GORELEASER_DOCKER_REFRESH" "false") "true" }}v{{ envOrDefault "MONOGO_APP_VERSION" .Version }}{{ end }}'
      - '{{ if ne (envOrDefault "GORELEASER_DOCKER_REFRESH" "false") "true" }}{{ envOrDefault "MONOGO_APP_VERSION" .Version }}{{ end }}'
      - "latest"
    dockerfile: apps/golang-starter/Dockerfile.goreleaser
    labels:
      "io.artifacthub.package.readme-url": "https://github.com/toozej/monogo/raw/main/README.md"
      "io.artifacthub.package.maintainers": "[{\"name\":\"toozej\"}]"
      "io.artifacthub.package.license": "GPLv3"
      "org.opencontainers.image.description": >-
        Golang starter app
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.name": "{{.ProjectName}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.version": '{{ envOrDefault "MONOGO_APP_VERSION" .Version }}'
      "org.opencontainers.image.source": "{{.GitURL}}"
      "org.opencontainers.image.authors": "James Tooze https://github.com/toozej/"
      "org.opencontainers.image.documentation": "https://github.com/toozej/monogo/raw/main/README.md"
      "org.opencontainers.image.licenses": "GPL-3.0-only"
      "org.opencontainers.image.title": "{{.ProjectName}}"
      "org.opencontainers.image.vendor": "James Tooze"
    annotations:
      "index,manifest:org.opencontainers.image.authors": "James Tooze https://github.com/toozej/"
      "index,manifest:org.opencontainers.image.created": "{{.Date}}"
      "index,manifest:org.opencontainers.image.description": >-
        Golang starter app
      "index,manifest:org.opencontainers.image.documentation": "https://github.com/toozej/monogo/raw/main/README.md"
      "index,manifest:org.opencontainers.image.licenses": "GPL-3.0-only"
      "index,manifest:org.opencontainers.image.revision": "{{.FullCommit}}"
      "index,manifest:org.opencontainers.image.source": "https://github.com/toozej/monogo"
      "index,manifest:org.opencontainers.image.title": "{{.ProjectName}}"
      "index,manifest:org.opencontainers.image.vendor": "James Tooze"
      "index,manifest:org.opencontainers.image.version": '{{ envOrDefault "MONOGO_APP_VERSION" .Version }}'
    extra_files:
      - scripts/goreleaser_entrypoint.sh
  - id: golang-starter-distroless
    images:
      - 'toozej/golang-starter'
      - 'ghcr.io/toozej/golang-starter'
      - 'quay.io/toozej/golang-starter'
    tags:
      - '{{ if ne (envOrDefault "GORELEASER_DOCKER_REFRESH" "false") "true" }}v{{ envOrDefault "MONOGO_APP_VERSION" .Version }}-distroless{{ end }}'
      - '{{ if ne (envOrDefault "GORELEASER_DOCKER_REFRESH" "false") "true" }}{{ envOrDefault "MONOGO_APP_VERSION" .Version }}-distroless{{ end }}'
      - "distroless"
    dockerfile: apps/golang-starter/Dockerfile.goreleaser.distroless
    labels:
      "io.artifacthub.package.readme-url": "https://github.com/toozej/monogo/raw/main/README.md"
      "io.artifacthub.package.maintainers": "[{\"name\":\"toozej\"}]"
      "io.artifacthub.package.license": "GPLv3"
      "org.opencontainers.image.description": >-
        Golang starter app
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.name": "{{.ProjectName}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.version": '{{ envOrDefault "MONOGO_APP_VERSION" .Version }}'
      "org.opencontainers.image.source": "{{.GitURL}}"
      "org.opencontainers.image.authors": "James Tooze https://github.com/toozej/"
      "org.opencontainers.image.documentation": "https://github.com/toozej/monogo/raw/main/README.md"
      "org.opencontainers.image.licenses": "GPL-3.0-only"
      "org.opencontainers.image.title": "{{.ProjectName}}"
      "org.opencontainers.image.vendor": "James Tooze"
    annotations:
      "index,manifest:org.opencontainers.image.authors": "James Tooze https://github.com/toozej/"
      "index,manifest:org.opencontainers.image.created": "{{.Date}}"
      "index,manifest:org.opencontainers.image.description": >-
        Golang starter app
      "index,manifest:org.opencontainers.image.documentation": "https://github.com/toozej/monogo/raw/main/README.md"
      "index,manifest:org.opencontainers.image.licenses": "GPL-3.0-only"
      "index,manifest:org.opencontainers.image.revision": "{{.FullCommit}}"
      "index,manifest:org.opencontainers.image.source": "https://github.com/toozej/monogo"
      "index,manifest:org.opencontainers.image.title": "{{.ProjectName}}"
      "index,manifest:org.opencontainers.image.vendor": "James Tooze"
      "index,manifest:org.opencontainers.image.version": '{{ envOrDefault "MONOGO_APP_VERSION" .Version }}'
    extra_files:
      - scripts/goreleaser_entrypoint.sh

archives:
  - name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: ['zip']
    files:
      - README.md
      - LICENSE
      - completions/golang-starter.bash
      - completions/golang-starter.fish
      - completions/golang-starter.zsh
      - manpages/golang-starter.1.gz

nfpms:
  - file_name_template: '{{ .ConventionalFileName }}'
    id: packages
    homepage: https://github.com/toozej/monogo
    description: |-
      Golang starter app
    maintainer: toozej
    license: GPLv3
    vendor: monogo
    bindir: /usr/bin
    section: utils
    contents:
      - src: ./completions/golang-starter.bash
        dst: /usr/share/bash-completion/completions/golang-starter
        file_info:
          mode: 0644
      - src: ./completions/golang-starter.fish
        dst: /usr/share/fish/completions/golang-starter.fish
        file_info:
          mode: 0644
      - src: ./completions/golang-starter.zsh
        dst: /usr/share/zsh/vendor-completions/_golang-starter
        file_info:
          mode: 0644
      - src: ./manpages/golang-starter.1.gz
        dst: /usr/share/man/man1/golang-starter.1.gz
        file_info:
          mode: 0644
      - src: ./LICENSE
        dst: /usr/share/doc/golang-starter/copyright
        file_info:
          mode: 0644
    formats:
      - apk
      - deb
      - rpm
    dependencies:
      - git
    recommends:
      - golang
    deb:
      lintian_overrides:
        - statically-linked-binary
        - changelog-file-missing-in-native-package

homebrew_casks:
  - name: golang-starter
    homepage: https://github.com/toozej/monogo
    description: >-
      Golang starter app
    license: GPLv3
    repository:
      owner: toozej
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    manpages:
      - "manpages/golang-starter.1.gz"
    completions:
      bash: "completions/golang-starter.bash"
      zsh: "completions/golang-starter.zsh"
      fish: "completions/golang-starter.fish"
    url:
      template: "https://github.com/toozej/monogo/releases/download/{{ envOrDefault \"MONOGO_RELEASE_TAG\" .Tag }}/{{ .ArtifactName }}"
      verified: "github.com/toozej/monogo/releases/download"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/golang-starter"]
          end

sboms:
  - artifacts: archive

signs:
  - cmd: cosign
    output: true
    signature: "${artifact}.sigstore.json"
    args:
      - 'sign-blob'
      - '--bundle=${signature}'
      - '${artifact}'
      - '--yes'
    artifacts: checksum

docker_signs:
  - cmd: cosign
    artifacts: all
    output: true
    args:
      - 'sign'
      - '--yes'
      - '${artifact}'

milestones:
  - close: true

release:
  mode: append
  disable: '{{ or (eq (envOrDefault "MONOGO_APP_RELEASE" "false") "true") (eq (envOrDefault "GORELEASER_DOCKER_REFRESH" "false") "true") }}'
  footer: |
    **Full Changelog**: https://github.com/toozej/monogo/compare/{{ .PreviousTag }}...{{ .Tag }}
