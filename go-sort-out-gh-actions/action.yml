---
name: 'Find Archived GitHub Actions'
description: 'Detect archived GitHub Actions in repository workflows (same as check-archived
  action)'
author: 'toozej'
inputs:
  token:
    description: 'GitHub token for API access'
    required: true
  verbose:
    description: 'Enable verbose output'
    required: false
    default: 'false'
  debug:
    description: 'Enable debug logging'
    required: false
    default: 'false'
  workflow:
    description: 'Path to specific workflow file to check (optional, checks all if not specified)'
    required: false
  workflows-dir:
    description: 'Path to directory containing workflow yaml files (optional, checks all if
      not specified)'
    required: false
  repos-dir:
    description: 'Path to base directory containing multiple repos to scan (optional)'
    required: false
  notify:
    description: 'Send notifications to configured endpoints'
    required: false
    default: 'false'
  create-issue:
    description: 'Create GitHub issue when archived actions are found'
    required: false
    default: 'false'
  notification-endpoints:
    description: 'Comma-separated list of notification endpoints (required if notify=true)'
    required: false
  stale-days:
    description: 'Number of days after which an action is considered stale (default 365)'
    required: false
    default: '365'
outputs:
  archived-count:
    description: 'Number of archived actions found'
    value: ${{ steps.check.outputs.archived-count }}
  has-archived:
    description: 'Whether any archived actions were found (true/false)'
    value: ${{ steps.check.outputs.has-archived }}
  stale-count:
    description: 'Number of stale/deprecated actions found'
    value: ${{ steps.check.outputs.stale-count }}
  has-stale:
    description: 'Whether any stale/deprecated actions were found (true/false)'
    value: ${{ steps.check.outputs.has-stale }}
runs:
  using: 'composite'
  steps:
    - id: check
  uses: toozej/go-sort-out-gh-actions/check-archived@main
  with:
  token: ${{ inputs.token }}
  verbose: ${{ inputs.verbose }}
  debug: ${{ inputs.debug }}
  workflow: ${{ inputs.workflow }}
  workflows-dir: ${{ inputs.workflows-dir }}
  repos-dir: ${{ inputs.repos-dir }}
  notify: ${{ inputs.notify }}
  create-issue: ${{ inputs.create-issue }}
  notification-endpoints: ${{ inputs.notification-endpoints }}
  stale-days: ${{ inputs.stale-days }}

# NOTE: This composite action references check-archived@main. When using this
# action via a version tag (e.g., @v2), the delegate will still resolve to @main.
# This is a known limitation of GitHub composite actions. If you need strict
# version pinning, use the check-archived action directly with a specific ref.

# Example usage in a workflow:
#
# name: Check for Archived Actions
# on:
#   schedule:
#   - cron: '0 0 * * 0' # Weekly on Sundays
#   workflow_dispatch:
#
# jobs:
#   check-archived-actions:
#     runs-on: ubuntu-latest
#     steps:
#     - name: Checkout code
#       uses: actions/checkout@v4
#
#     - name: Check for archived GitHub Actions
#       id: check
#       uses: toozej/go-sort-out-gh-actions@main
#       with:
#         token: ${{ secrets.GITHUB_TOKEN }}
#         verbose: true
#         create-issue: true
#
#     - name: Fail if archived actions found
#       if: steps.check.outputs.has-archived == 'true'
#       run: |
#         echo "Archived GitHub Actions detected. Please replace them."
#         exit 1
#
# NOTE: The create-issue input creates a repository-level issue.
# For PR-specific comments during pull request review, use the actions/github-script
# action with steps.check.outputs.has-archived and steps.check.outputs.archived-count.
