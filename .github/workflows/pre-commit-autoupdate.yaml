---
name: tool and pre-commit autoupdate

on:
  # Stagger after CI (Mondays 01:00 UTC) so the two weekly schedules don't collide.
  schedule:
    - cron: "23 2 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  # Needed so the workflow can create the `dependencies` label on first run.
  issues: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  autoupdate:
    runs-on: ubuntu-latest
    steps:
      # Mint a GitHub App installation token. The PR is created with THIS token
      # (not the default GITHUB_TOKEN) on purpose: PRs/pushes made with
      # GITHUB_TOKEN do not trigger other workflows, so CI would never run on the
      # bot PR. An App token does trigger CI, which is what gates auto-merge.
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.AUTOUPDATE_APP_ID }}
          private-key: ${{ secrets.AUTOUPDATE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '^1.26'
          check-latest: true

      - name: Update pinned Go tools and pre-commit hooks
        # The Make target upgrades tools/go-tools.tsv and every hook `rev:`, installs
        # those exact versions, regenerates configs, and validates the result.
        run: make pre-commit-update

      - name: Ensure dependencies label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # --force creates the label if missing and updates it otherwise, so this
        # never fails. Matches the `dependencies` label dependabot also uses.
        run: |
          gh label create dependencies \
            --color "0366d6" \
            --description "Pull requests that update a dependency" \
            --force

      - name: Create pull request
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "chore(tools): autoupdate"
          title: "chore(tools): autoupdate"
          body: |
            Automated pinned Go tool and `pre-commit autoupdate` refresh.

            `make pre-commit-update` upgraded `tools/go-tools.tsv` and hook revisions,
            installed those versions, regenerated app configs, and validated the
            result before this PR was opened. Full CI runs again on this PR and
            gates auto-merge.
          branch: "chore/tools-autoupdate"
          delete-branch: true
          labels: dependencies

      - name: Enable auto-merge
        # Only when a PR actually exists. Auto-merge waits for the required CI
        # checks (branch protection on main) and squash-merges once they pass; if
        # CI fails the PR simply stays open instead of merging.
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh pr merge --squash --auto "${{ steps.cpr.outputs.pull-request-number }}"
