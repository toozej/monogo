---
name: Weekly Docker Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * 2"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  resolve-apps:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.list.outputs.apps }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - name: Fetch all tags
        run: git fetch --force --tags
      - name: List released apps
        id: list
        # Only apps with a published apps/<app>/vX.Y.Z tag have a released image
        # to refresh; unreleased apps (e.g. one not yet tagged) are skipped so a
        # single tagless app can't fail the whole scheduled refresh.
        run: |
          set -euo pipefail
          apps=()
          for dir in apps/*/; do
            app="$(basename "$dir")"
            if git for-each-ref --format='%(refname:strip=2)' "refs/tags/apps/${app}/v*" \
              | grep -qE "^apps/${app}/v[0-9]+\.[0-9]+\.[0-9]+$"; then
              apps+=("$app")
            fi
          done
          if [ "${#apps[@]}" -eq 0 ]; then
            json='[]'
          else
            json="$(printf '%s\n' "${apps[@]}" | jq -R . | jq -cs .)"
          fi
          echo "Released apps: ${json}"
          echo "apps=${json}" >> "${GITHUB_OUTPUT}"

  goreleaser-weekly-docker-refresh:
    runs-on: ubuntu-latest
    needs: resolve-apps
    if: needs.resolve-apps.outputs.apps != '[]'
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        app: ${{ fromJson(needs.resolve-apps.outputs.apps) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Fetch all tags
        run: git fetch --force --tags

      - name: Resolve latest release/tag
        id: release_tag
        run: |
          set -euo pipefail

          app_tag="$(git for-each-ref \
            --sort=-version:refname \
            --format='%(refname:strip=2)' \
            "refs/tags/apps/${{ matrix.app }}/v*" \
            | grep -E '^apps/${{ matrix.app }}/v[0-9]+\.[0-9]+\.[0-9]+$' \
            | head -n 1 || true)"
          if [ -z "${app_tag}" ]; then
            echo "Unable to resolve latest release/tag for ${{ matrix.app }}" >&2
            exit 1
          fi

          version_tag="${app_tag##*/}"
          version="${version_tag#v}"
          image="$(awk '/^name:/ {v=$0; sub(/^name:[[:space:]]*/, "", v); sub(/[[:space:]]*#.*/, "", v); gsub(/["[:space:]]/, "", v); print tolower(v); exit}' "apps/${{ matrix.app }}/app.yaml")"
          if [ -z "$image" ]; then
            echo "Unable to resolve Docker image name for ${{ matrix.app }}" >&2
            exit 1
          fi

          git tag --force "$version_tag" "$GITHUB_SHA"

          echo "Using release/tag: ${app_tag}"
          {
            echo "app_tag=${app_tag}"
            echo "image=${image}"
            echo "tag=${version_tag}"
            echo "version=${version}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '^1.26'
          check-latest: true

      - name: Install gomplate
        run: make pre-reqs

      - name: Generate app configs
        run: make app-generate APP=${{ matrix.app }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4 # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha

      - uses: sigstore/cosign-installer@v4.1.2 # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha

      - uses: anchore/sbom-action/download-syft@v0 # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha

      - name: Login to DockerHub
        uses: docker/login-action@v4 # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4 # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_GHCR_TOKEN }}

      - name: Login to Quay Container Registry
        uses: docker/login-action@v4 # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Run GoReleaser Docker refresh
        uses: goreleaser/goreleaser-action@v7 # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --skip=announce,archive,before,homebrew,nfpm,sbom,validate
            --config apps/${{ matrix.app }}/.goreleaser.yml
          workdir: ${{ github.workspace }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.release_tag.outputs.tag }}
          GORELEASER_DOCKER_REFRESH: "true"
          MONOGO_APP_VERSION: ${{ steps.release_tag.outputs.version }}
          MONOGO_RELEASE_TAG: ${{ steps.release_tag.outputs.app_tag }}

      - uses: actions/attest-build-provenance@v4
        with:
          subject-checksums: ./dist/${{ matrix.app }}/digests.txt

  verify_signed_docker_images:
    runs-on: ubuntu-latest
    needs: [resolve-apps, goreleaser-weekly-docker-refresh]
    if: needs.resolve-apps.outputs.apps != '[]'
    permissions: {}
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.resolve-apps.outputs.apps) }}
        registry: ['', 'ghcr.io/', 'quay.io/']
        tag: ['latest', 'distroless']
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2 # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha
      - name: Verify signatures of Docker images
        run: |
          app="${{ matrix.app }}"
          image="${app,,}"
          cosign verify \
            --certificate-identity-regexp '^https://github.com/toozej/monogo/.github/workflows/(release|weekly-docker-refresh).yaml@refs/(tags/.*|heads/main)$' \
            --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
            "${{ matrix.registry }}toozej/${image}:${{ matrix.tag }}"
