---
name: Weekly Docker Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * 2"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  resolve-apps:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.list.outputs.apps }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Fetch all tags
        run: git fetch --force --tags
      - name: List released apps
        id: list
        # Only apps with a published apps/<app>/vX.Y.Z tag have a released image
        # to refresh; unreleased apps (e.g. one not yet tagged) are skipped so a
        # single tagless app can't fail the whole scheduled refresh.
        run: |
          set -euo pipefail
          apps=()
          for dir in apps/*/; do
            app="$(basename "$dir")"
            if git for-each-ref --format='%(refname:strip=2)' "refs/tags/apps/${app}/v*" \
              | grep -qE "^apps/${app}/v[0-9]+\.[0-9]+\.[0-9]+$"; then
              apps+=("$app")
            fi
          done
          if [ "${#apps[@]}" -eq 0 ]; then
            json='[]'
          else
            json="$(printf '%s\n' "${apps[@]}" | jq -R . | jq -cs .)"
          fi
          echo "Released apps: ${json}"
          echo "apps=${json}" >> "${GITHUB_OUTPUT}"

  goreleaser-weekly-docker-refresh:
    runs-on: ubuntu-latest
    needs: resolve-apps
    if: needs.resolve-apps.outputs.apps != '[]'
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        app: ${{ fromJson(needs.resolve-apps.outputs.apps) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Fetch all tags
        run: git fetch --force --tags

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '^1.26'
          check-latest: true

      - name: Cache pinned release tools
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .tools/bin
          key: ${{ runner.os }}-${{ runner.arch }}-release-tools-${{ hashFiles('tools/go-tools.tsv',
            'scripts/manage-go-tools.sh') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-release-tools-

      - name: Install pinned release tools
        run: |
          # Save the current workflow wrapper before checking out an older app
          # release commit, whose Makefile may predate the wrapper target. The
          # refresh runs GoReleaser with --skip=sbom, so syft is not installed.
          cp Makefile "$RUNNER_TEMP/monogo.Makefile"
          make docker-refresh-tools-install
          echo "$PWD/.tools/bin" >> "$GITHUB_PATH"

      - name: Resolve and check out latest release commit
        id: release_tag
        run: |
          set -euo pipefail

          app_tag="$(git for-each-ref \
            --sort=-version:refname \
            --format='%(refname:strip=2)' \
            "refs/tags/apps/${{ matrix.app }}/v*" \
            | grep -E '^apps/${{ matrix.app }}/v[0-9]+\.[0-9]+\.[0-9]+$' \
            | head -n 1 || true)"
          if [ -z "${app_tag}" ]; then
            echo "Unable to resolve latest release/tag for ${{ matrix.app }}" >&2
            exit 1
          fi

          version_tag="${app_tag##*/}"
          version="${version_tag#v}"
          release_sha="$(git rev-list -n 1 "$app_tag")"

          # Rebuild the exact released code on fresh base images: detach onto the
          # commit the release tag points at so GoReleaser builds that source,
          # while Docker re-pulls the FROM base layers (picking up upstream
          # patches). The keyless cosign identity is fixed by the workflow ref
          # (heads/main), not the checked-out commit, so signing is unaffected.
          git checkout --force --detach "$release_sha"

          app_config="apps/${{ matrix.app }}/app.yaml"
          if [ ! -f "$app_config" ]; then
            echo "::error::${app_tag} (${release_sha}) is not a monorepo release" \
              "commit (missing ${app_config}); re-release ${{ matrix.app }} from" \
              "the monorepo before it can be refreshed." >&2
            exit 1
          fi

          image="$(awk '/^name:/ {v=$0; sub(/^name:[[:space:]]*/, "", v); sub(/[[:space:]]*#.*/, "", v); gsub(/["[:space:]]/, "", v); print tolower(v); exit}' "$app_config")"
          if [ -z "$image" ]; then
            echo "Unable to resolve Docker image name for ${{ matrix.app }}" >&2
            exit 1
          fi

          # GoReleaser parses a clean vX.Y.Z tag; point it at the released commit.
          git tag --force "$version_tag" "$release_sha"

          echo "Using release/tag: ${app_tag} (${release_sha})"
          {
            echo "app_tag=${app_tag}"
            echo "image=${image}"
            echo "tag=${version_tag}"
            echo "version=${version}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to DockerHub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_GHCR_TOKEN }}

      - name: Login to Quay Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Run GoReleaser Docker refresh
        run: make -f "$RUNNER_TEMP/monogo.Makefile" ci-docker-refresh-no-prereqs APP=${{ matrix.app
          }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.release_tag.outputs.tag }}
          GORELEASER_DOCKER_REFRESH: "true"
          MONOGO_APP_VERSION: ${{ steps.release_tag.outputs.version }}
          MONOGO_RELEASE_TAG: ${{ steps.release_tag.outputs.app_tag }}

      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-checksums: ./dist/${{ matrix.app }}/digests.txt

  verify_signed_docker_images:
    runs-on: ubuntu-latest
    needs: [resolve-apps, goreleaser-weekly-docker-refresh]
    if: needs.resolve-apps.outputs.apps != '[]'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.resolve-apps.outputs.apps) }}
        registry: ['', 'ghcr.io/', 'quay.io/']
        tag: ['latest', 'distroless']
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '^1.26'
          check-latest: true
      - name: Cache pinned release tools
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .tools/bin
          key: ${{ runner.os }}-${{ runner.arch }}-release-tools-${{ hashFiles('tools/go-tools.tsv',
            'scripts/manage-go-tools.sh') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-release-tools-
      - name: Verify signatures of Docker images
        run: |
          app="${{ matrix.app }}"
          image="${app,,}"
          make verify \
            APP="${{ matrix.app }}" \
            IMAGE_NAME="${image}" \
            IMAGE_REGISTRY="${{ matrix.registry }}" \
            IMAGE_TAG="${{ matrix.tag }}"
