---
name: CI

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - "*"
  schedule:
    - cron: "18 1 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '^1.26'
          check-latest: true
      - name: Run pre-commit
        run: |
          pip install pre-commit
          make pre-commit
      - name: Run tests
        run: |
          make test
      - name: Slack notification on failure
        if: failure() && env.SLACK_TOKEN != ''
        uses: slackapi/slack-github-action@v2.1.0 # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: |
              :x: *CI Checks Failed*
              Repository: ${{ github.repository }}
              Branch: ${{ github.ref_name }}
              Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
              Commit: ${{ github.sha }}
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}

  demo:
    name: demo-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '^1.26'
          check-latest: true
      - name: Build binary
        run: make local-build
      - name: Demo - check archived actions
        run: |
          ./out/go-sort-out-gh-actions archived \
          --workflow example/workflows/example-archived-actions.yaml \
          --verbose \
          --token ${{ secrets.GH_TOKEN }} || true
      - name: Demo - check outdated actions
        run: |
          ./out/go-sort-out-gh-actions outdated \
          --workflow example/workflows/example-archived-actions.yaml \
          --verbose \
          --token ${{ secrets.GH_TOKEN }} || true
      - name: Demo - check EOL actions
        run: |
          ./out/go-sort-out-gh-actions eol \
          --workflow example/workflows/example-archived-actions.yaml \
          --verbose \
          --stale-days 365 \
          --token ${{ secrets.GH_TOKEN }} || true
      - name: Demo - check all (archived + EOL + outdated)
        run: |
          ./out/go-sort-out-gh-actions check \
          --workflow example/workflows/example-archived-actions.yaml \
          --verbose \
          --stale-days 365 \
          --token ${{ secrets.GH_TOKEN }} || true
      - name: Demo - Slack notification
        if: env.SLACK_TOKEN != ''
        run: |
          ./out/go-sort-out-gh-actions check \
          --workflow example/workflows/example-archived-actions.yaml \
          --verbose \
          --stale-days 365 \
          --notify \
          --token ${{ secrets.GH_TOKEN }} || true
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
      - name: Slack notification on failure
        if: failure() && env.SLACK_TOKEN != ''
        uses: slackapi/slack-github-action@v2.1.0 # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: |
              :warning: *CI Demo Run Failed*
              Repository: ${{ github.repository }}
              Branch: ${{ github.ref_name }}
              Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
              Commit: ${{ github.sha }}
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}

  e2e:
    name: e2e-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '^1.26'
          check-latest: true
      - name: Build binary
        run: make local-build
      - name: E2E - verify archived actions are detected
        run: |
          output=$(./out/go-sort-out-gh-actions archived \
          --workflow example/workflows/example-archived-actions.yaml \
          --token ${{ secrets.GH_TOKEN }} 2>&1) || true
          echo "$output"
          if ! echo "$output" | grep -q "actions-rs"; then
            echo "FAIL: Expected archived actions-rs actions to be detected"
            exit 1
          fi
          echo "PASS: Archived actions detected correctly"
      - name: E2E - verify debug mode shows rate limit info
        run: |
          output=$(./out/go-sort-out-gh-actions archived \
          --workflow example/workflows/example-archived-actions.yaml \
          --debug \
          --token ${{ secrets.GH_TOKEN }} 2>&1) || true
          echo "$output"
          if ! echo "$output" | grep -qi "rate limit"; then
            echo "WARN: Rate limit info not found in debug output (may not be available for all token types)"
          fi
          echo "PASS: Debug mode executed successfully"
      - name: E2E - verify EOL/stale check works
        run: |
          output=$(./out/go-sort-out-gh-actions eol \
          --workflow example/workflows/example-archived-actions.yaml \
          --stale-days 365 \
          --token ${{ secrets.GH_TOKEN }} 2>&1) || true
          echo "$output"
          echo "PASS: EOL/stale check executed successfully"
      - name: E2E - Slack notification
        if: env.SLACK_TOKEN != ''
        run: |
          ./out/go-sort-out-gh-actions archived \
          --workflow example/workflows/example-archived-actions.yaml \
          --verbose \
          --notify \
          --token ${{ secrets.GH_TOKEN }} || true
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
      - name: Slack notification on failure
        if: failure() && env.SLACK_TOKEN != ''
        uses: slackapi/slack-github-action@v2.1.0 # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: |
              :x: *E2E Tests Failed*
              Repository: ${{ github.repository }}
              Branch: ${{ github.ref_name }}
              Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
              Commit: ${{ github.sha }}
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2 # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

  codeql-analyze:
    name: codeql-analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '^1.26'
          check-latest: true
      - uses: github/codeql-action/init@v4.35.2 # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha
        with:
          languages: go
      - uses: github/codeql-action/autobuild@v4.35.2 # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha
      - uses: github/codeql-action/analyze@v4.35.2 # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha

  trivy-scan-source:
    name: trivy-scan-source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run Trivy vulnerability scanner in fs mode
        uses: aquasecurity/trivy-action@master # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  snyk:
    name: snyk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: snyk/actions/setup@master # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha
      - uses: actions/setup-go@v6
        with:
          go-version: '^1.26'
          check-latest: true
      - name: Snyk monitor
        run: snyk test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1
