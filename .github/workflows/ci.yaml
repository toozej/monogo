---
name: CI

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - "*"
  schedule:
    - cron: "0 1 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    # Repo-wide checks (pre-commit, govulncheck) run once rather than once per
    # app; per-app license reports run in the test matrix. Configs are generated
    # once by the composed Task workflow.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '^1.26'
          check-latest: true
      - name: Install Task
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: 3.52.0
      - name: Cache pinned repository tools
        id: checks-tools-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .tools/bin
            ~/.cache/pip
            ~/.cache/pre-commit
          key: ${{ runner.os }}-${{ runner.arch }}-checks-tools-${{ hashFiles('Taskfile.yml',
            '.pre-commit-config.yaml', 'tools/go-tools.tsv', 'scripts/manage-go-tools.sh',
            'scripts/install-system-tools.sh') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-checks-tools-
      - name: Install pinned repository tools
        if: steps.checks-tools-cache.outputs.cache-hit != 'true'
        run: task tools:pre-commit
      - name: Run repository checks
        run: task ci:checks SKIP_TOOL_INSTALL=1

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - golang-starter
          - gotts-it
          - url2anki
          - RSSFFS
          - go-find-liquor
          - photos2map
          - go-listen
          - ghreleases2rss
          - terranotate
          - lego-stego
          - files2prompt
          - trails-completionist
          - go-sort-out-gh-actions
          - kmhd2playlist
          - rss2socials
          - podgrab
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '^1.26'
          check-latest: true
      - name: Install Task
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: 3.52.0
      - name: Cache pinned test tools
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .tools/bin
          key: ${{ runner.os }}-${{ runner.arch }}-test-tools-${{ hashFiles('tools/go-tools.tsv',
            'scripts/manage-go-tools.sh') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-test-tools-
      - name: Run app checks
        run: task ci:test APP=${{ matrix.app }}
      - name: Run mutation testing
        # Mutation testing re-runs the test suite for every generated mutant, so
        # keep it off routine pushes and pull requests.
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: task test:mutation APP=${{ matrix.app }}

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          # gitleaks-action requires a token to read PR commits on pull_request
          # events; the built-in GITHUB_TOKEN is always available for same-repo PRs.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql-analyze:
    name: codeql-analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '^1.26'
          check-latest: true
      - name: Install Task
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: 3.52.0
      - name: Generate app configs
        run: task generate-all
      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: go
      - uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2

  trivy-scan-source:
    name: trivy-scan-source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run Trivy vulnerability scanner in fs mode
        uses: aquasecurity/trivy-action@master # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha, yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  snyk:
    name: snyk
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/golang@master # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
        continue-on-error: true # To make sure that SARIF upload gets called
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --all-projects --sarif-file-output=snyk.sarif
      - name: Upload result to GitHub Code Scanning
        # Only upload when Snyk actually produced a SARIF (it does not when
        # SNYK_TOKEN is unset), so a missing report does not fail the job.
        if: ${{ hashFiles('snyk.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: snyk.sarif

  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@f72ff1a1336129f29bf0166c0fd0ca6cf1bcb38c # v1.2.1
