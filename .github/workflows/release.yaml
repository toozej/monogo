---
name: Release

on:
  push:
    tags:
      - "v[0-9]*.*.*"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  attestations: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    if: contains(github.ref_name, '.')
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        app:
          - monogo
          - gotts-it
          - url2anki
          - RSSFFS
          - go-find-liquor
          - photos2map
    steps:
      - name: Validate semver tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$TAG' is not a valid semver tag. Skipping release."
            exit 1
          fi
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Fetch all tags
        run: git fetch --force --tags
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '^1.26'
          check-latest: true
      - name: Install gomplate
        run: make pre-reqs
      - name: Generate app configs
        run: make app-generate APP=${{ matrix.app }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4 # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha
      - uses: sigstore/cosign-installer@v4.1.2 # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha
      - uses: anchore/sbom-action/download-syft@v0 # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha
      - name: Login to DockerHub
        uses: docker/login-action@v4 # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4 # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_GHCR_TOKEN }}
      - name: Login to Quay Container Registry
        uses: docker/login-action@v4 # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7 # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --config apps/${{ matrix.app }}/.goreleaser.yml
          workdir: ${{ github.workspace }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
      - uses: actions/attest-build-provenance@v4
        with:
          subject-checksums: ./dist/${{ matrix.app }}/checksums.txt
      - uses: actions/attest-build-provenance@v4
        with:
          subject-checksums: ./dist/${{ matrix.app }}/digests.txt
      - uses: actions/upload-artifact@v4
        with:
          name: goreleaser-${{ matrix.app }}-dist
          path: ./dist/${{ matrix.app }}

  verify_signed_checksums:
    runs-on: ubuntu-latest
    needs: goreleaser
    permissions:
      actions: read
    strategy:
      fail-fast: false
      matrix:
        app:
          - monogo
          - gotts-it
          - url2anki
          - RSSFFS
          - go-find-liquor
          - photos2map
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2 # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha
      - uses: actions/download-artifact@v4
        with:
          name: goreleaser-${{ matrix.app }}-dist
          path: ./dist/${{ matrix.app }}
      - name: Verify signature of checksums file
        run: |
          cosign verify-blob \
            --bundle ./dist/${{ matrix.app }}/checksums.txt.sigstore.json \
            --certificate-identity-regexp '^https://github.com/toozej/monogo/.github/workflows/(release|weekly-docker-refresh).yaml@refs/(tags/.*|heads/main)$' \
            --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
            ./dist/${{ matrix.app }}/checksums.txt

  trivy-scan-image:
    name: trivy-scan-image
    needs: goreleaser
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - monogo
          - gotts-it
          - url2anki
          - RSSFFS
          - go-find-liquor
          - photos2map
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha
        with:
          image-ref: ghcr.io/toozej/${{ matrix.app }}:latest
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  verify_signed_docker_images:
    runs-on: ubuntu-latest
    needs: [goreleaser, trivy-scan-image]
    permissions: {}
    strategy:
      fail-fast: false
      matrix:
        app:
          - monogo
          - gotts-it
          - url2anki
          - RSSFFS
          - go-find-liquor
          - photos2map
        registry: ['', 'ghcr.io/', 'quay.io/']
        tag: ['latest', 'distroless']
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2 # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha
      - name: Verify signatures of Docker images
        run: |
          cosign verify \
            --certificate-identity-regexp '^https://github.com/toozej/monogo/.github/workflows/(release|weekly-docker-refresh).yaml@refs/(tags/.*|heads/main)$' \
            --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
            ${{ matrix.registry }}toozej/${{ matrix.app }}:${{ matrix.tag }}
