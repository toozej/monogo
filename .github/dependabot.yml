---
# from https://github.com/goreleaser/nfpm/blob/main/.github/dependabot.yml
version: 2
multi-ecosystem-groups:
  combined:
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
      include: "scope"
updates:
  # Go modules: single root module for the whole monorepo (per-app go.mod
  # files live under apps/*/.monogo/original-module/ and are archived, not built).
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
      include: "scope"
    patterns:
      - "*"
    multi-ecosystem-group: "combined"
  # npm: go-listen ships JavaScript tests (Jest) for its web interface.
  - package-ecosystem: "npm"
    directory: "/apps/go-listen"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
      include: "scope"
    patterns:
      - "*"
    multi-ecosystem-group: "combined"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
      include: "scope"
    patterns:
      - "*"
    multi-ecosystem-group: "combined"
  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
      include: "scope"
    patterns:
      - "*"
    multi-ecosystem-group: "combined"
  # Docker: glob over every app directory so newly imported apps are covered
  # automatically, plus the hand-maintained devcontainer image. The docker
  # ecosystem is non-recursive, so archived Dockerfiles under apps/*/.monogo/
  # are not touched. Note: app base images (golang, distroless) are templated
  # from each app's app.yaml, so image bumps Dependabot makes to generated
  # apps/* Dockerfiles may be reverted on the next template re-render -- update
  # app.yaml to make them stick. The .devcontainer/Dockerfile is not templated,
  # so bumps there persist.
  - package-ecosystem: "docker"
    directories:
      - "/apps/*"
      - "/.devcontainer"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
      include: "scope"
    patterns:
      - "*"
    multi-ecosystem-group: "combined"
  # Docker Compose: each app ships a docker-compose.yml (RSSFFS also a
  # docker-compose.dev.yml). Today these only reference first-party
  # toozej/*:latest images (nothing to bump), but this keeps third-party
  # service images covered if any are added later.
  - package-ecosystem: "docker-compose"
    directories:
      - "/apps/*"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
      include: "scope"
    patterns:
      - "*"
    multi-ecosystem-group: "combined"
