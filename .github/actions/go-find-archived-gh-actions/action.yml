---
name: 'Find Archived GitHub Actions'
description: 'Detect archived GitHub Actions in repository workflows'
author: 'toozej'
inputs:
  token:
    description: 'GitHub token for API access'
    required: true
  verbose:
    description: 'Enable verbose output'
    required: false
    default: 'false'
  debug:
    description: 'Enable debug logging'
    required: false
    default: 'false'
  workflow:
    description: 'Path to specific workflow file to check (optional, checks all if not specified)'
    required: false
  notify:
    description: 'Send notifications to configured endpoints'
    required: false
    default: 'false'
  create-issue:
    description: 'Create GitHub issue when archived actions are found'
    required: false
    default: 'false'
  notification-endpoints:
    description: 'Comma-separated list of notification endpoints (required if notify=true)'
    required: false
  check-outdated:
    description: 'Check for outdated action versions'
    required: false
    default: 'false'
  write:
    description: 'Write updates to workflow files, pinning outdated actions to latest version SHA with semver comment (requires check-outdated=true)'
    required: false
    default: 'false'
outputs:
  archived-count:
    description: 'Number of archived actions found'
    value: ${{ steps.check.outputs.archived-count }}
  has-archived:
    description: 'Whether any archived actions were found (true/false)'
    value: ${{ steps.check.outputs.has-archived }}
runs:
  using: 'docker'
  image: 'docker://ghcr.io/toozej/go-find-archived-gh-actions:latest'
  args:
  - ${{ inputs.verbose == 'true' && '--verbose' || '' }}
  - ${{ inputs.debug == 'true' && '--debug' || '' }}
  - ${{ inputs.workflow && format('--workflow={0}', inputs.workflow) || '' }}
  - ${{ inputs.notify == 'true' && '--notify' || '' }}
  - ${{ inputs.create-issue == 'true' && '--create-issue' || '' }}
  - ${{ inputs.check-outdated == 'true' && '--check-outdated' || '' }}
  - ${{ inputs.write == 'true' && '--write' || '' }}
  env:
    GH_TOKEN: ${{ inputs.token }}
    GITHUB_REPOSITORY: ${{ github.repository }}
    NOTIFICATION_ENDPOINTS: ${{ inputs.notification-endpoints }}
    CREATE_ISSUES: ${{ inputs.create-issue }}

