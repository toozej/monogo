#         id: check
#         uses: toozej/go-find-archived-gh-actions@main
#         with:
#           token: ${{ secrets.GITHUB_TOKEN }}
#           verbose: true
#           create-issue: true
#
#       - name: Fail if archived actions found
#         if: steps.check.outputs.has-archived == 'true'
#         run: |
