---
default_language_version: {python: python3}
minimum_pre_commit_version: "1.15"

# Imported apps preserve their original go.mod/go.sum and build config under
# apps/<app>/.monogo/. Those archival files are not part of the active build, so
# exclude them from all hooks (the *-mod Go hooks would otherwise try to lint and
# test the empty preserved module and fail).
exclude: '(^|/)\.monogo/'

repos:
  # generate app-local config files from gomplate templates before linting them
  - repo: local
    hooks:
      - id: generate-app-configs
        name: Generate app configs with gomplate
        entry: make generate-all
        language: system
        pass_filenames: false
      - id: goreleaser-check-apps
        name: Check generated GoReleaser app configs
        entry: bash -c 'for app in apps/*; do if [ -f "$app/.goreleaser.yml" ]; then goreleaser
          check --config "$app/.goreleaser.yml"; fi; done'
        language: system
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        name: Check for valid YAML syntax in repo
        description: https://github.com/pre-commit/pre-commit-hooks/blob/master/pre_commit_hooks/check_yaml.py
      - id: detect-private-key
        name: Check for existence of private key in repo
        description: https://github.com/pre-commit/pre-commit-hooks/blob/master/pre_commit_hooks/detect_private_key.py
      - id: trailing-whitespace
        name: Remove trailing whitespace in YAML,Bash,Python files
        description: https://github.com/pre-commit/pre-commit-hooks/blob/master/pre_commit_hooks/trailing_whitespace_fixer.py
        files: \.(py|sh|yaml|yml)$
      - id: end-of-file-fixer
        name: Ensure EOF is consistently only a newline
        description: https://github.com/pre-commit/pre-commit-hooks/blob/master/pre_commit_hooks/end_of_file_fixer.py
        files: \.(py|sh|yaml|yml)$
      - id: mixed-line-ending
        name: Ensure line-ending is consistent
        description: https://github.com/pre-commit/pre-commit-hooks/blob/master/pre_commit_hooks/mixed_line_ending.py
        files: \.(py|sh|yaml|yml)$
      - id: check-executables-have-shebangs
        name: Checks that non-binary executables have a proper shebang
        description: https://github.com/pre-commit/pre-commit-hooks/blob/master/pre_commit_hooks/check_executables_have_shebangs.py
        files: \.(py|sh)$
      - id: check-shebang-scripts-are-executable
        name: Checks that scripts with shebangs are executable.
        description: https://github.com/pre-commit/pre-commit-hooks/blob/master/pre_commit_hooks/check_shebang_scripts_are_executable.py
        files: \.(py|sh)$
      - id: check-toml
        name: Attempts to load all toml files to verify syntax.
        description: https://github.com/pre-commit/pre-commit-hooks/blob/master/pre_commit_hooks/check_toml.py
        files: \.(toml)$

  # format yaml
  - repo: https://github.com/jumanjihouse/pre-commit-hook-yamlfmt
    rev: 0.2.3
    hooks:
      - id: yamlfmt
        args: [--mapping, "2", --sequence, "4", --offset, "2", --width, "88", --preserve-quotes]
        # .goreleaser.yml is generated by gomplate (make generate-all) on every run;
        # gomplate emits long app descriptions on one line while yamlfmt re-wrapped
        # them at --width, so the formatters fought each run. app.yaml carries the
        # same long free-text description and should likewise stay on one line.
        # Both are structured config validated elsewhere (goreleaser check /
        # check-yaml), so leave their formatting alone.
        exclude: '(^|/)(\.goreleaser\.ya?ml|app\.yaml)$'

  # Golang formatting, linting, security and static analysis
  - repo: https://github.com/tekwizely/pre-commit-golang
    rev: v1.0.0-rc.4
    hooks:
      - id: go-sec-mod
      - id: go-staticcheck-mod
      # testdata holds fixtures (incl. intentionally-invalid .go files used as test
      # inputs) that the Go toolchain ignores; the per-file hooks below would
      # otherwise try to parse/format them and fail.
      - id: go-critic
        exclude: '(^|/)testdata/'
      # disabled until https://github.com/orijtech/structslop/pull/63 is merged
      # - id: go-structslop-mod
      - id: go-fmt
        exclude: '(^|/)testdata/'
      - id: go-imports
        exclude: '(^|/)testdata/'
      - id: golangci-lint-mod
      - id: go-test-mod
        args: [-race]

  # run shellcheck on Bash scripts
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck

  # lint Dockerfile
  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint-docker
        args: ["--ignore", "DL3007", "--ignore", "DL3008", "--ignore", "DL3013", "--ignore",
          "DL3062"]
        files: (^|/)Dockerfile(\.(distroless|goreleaser|goreleaser\.distroless))?$

  # lint Makefile
  - repo: https://github.com/checkmake/checkmake/
    rev: v0.3.0
    hooks:
      - id: checkmake
        files: (^|/)Makefile$

  # lint GitHub Actions workflows
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # Python linting and formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # Find dead Python code
  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.16
    hooks:
      - id: vulture
        args: ["scripts"]

  # Python security scanning
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: ["-iii", "-lll", "-q"]

  # Modernize Python syntax to target 3.11+
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        args: ["--py311-plus"]

  # Additional Python grep-based checks
  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: python-check-blanket-type-ignore
      - id: python-check-mock-methods
      - id: python-no-eval
      - id: python-use-type-annotations
      - id: text-unicode-replacement-char
      - id: python-no-log-warn

  # run semgrep on all known filetypes
  - repo: https://github.com/semgrep/pre-commit
    rev: 'v1.169.0'
    hooks:
      - id: semgrep
        # See https://semgrep.dev/explore to select a ruleset and copy its URL
        # Exclude advisory security.audit rules that produce false positives on
        # legitimate CLI/server patterns and test mock HTTP servers (a CLI that
        # shells out to git/gh; *_test.go mocks that write to a ResponseWriter).
        args: ['--config', 'auto', '--error', '--skip-unknown-extensions', '--quiet', '--exclude-rule',
          'go.lang.security.audit.dangerous-exec-command.dangerous-exec-command', '--exclude-rule',
          'go.lang.security.audit.xss.no-direct-write-to-responsewriter.no-direct-write-to-responsewriter',
          '--exclude-rule', 'go.lang.security.audit.xss.no-fprintf-to-responsewriter.no-fprintf-to-responsewriter']
        # Skip intentional example/fixture/demo data shipped by imported apps
        # (e.g. terranotate's deliberately-insecure Terraform examples that serve
        # as validator test inputs; go-sort-out-gh-actions' deliberately-unpinned
        # e2e/ workflow fixtures and *example*.yaml usage docs) and vendored
        # third-party frontend JS bundles (e.g. podgrab's apps/podgrab/webassets/
        # *.js: axios, luxon, vue, etc.). These are not real first-party
        # code/infrastructure. pre-commit passes filenames explicitly, so this
        # exclude — not .semgrepignore — is what actually filters them out.
        exclude: '(^|/)(examples?|demo|demo-assets|testdata|tracks|e2e)/|(^|/)webassets/.*\.js$|(^|/)[^/]*example[^/]*\.ya?ml$'

  - repo: meta
    hooks:
      - id: check-hooks-apply
      - id: check-useless-excludes
